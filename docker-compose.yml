# Локальный PostgreSQL для разработки и тестов `audit/`.
# Учётные данные совпадают с audit/config/dev.exs и audit/config/test.exs.
#
# Запуск: docker compose up -d
# Остановка: docker compose down
#
# БД `audit_dev` и `audit_test` создаются через mix ecto.create (см. mix aliases в audit/mix.exs).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
